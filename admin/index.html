<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Abdul Ghani</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./admin.css">
</head>
<body>

    <!-- Login Container -->
    <div id="login-section" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>Admin<span>Login</span></h2>
                <p>Enter your credentials to manage your portfolio</p>
            </div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="admin@test.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Login to Dashboard</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Layout -->
    <div id="dashboard-section" class="dashboard">
        <!-- Mobile Header -->
        <div class="mobile-nav">
            <a href="#" class="sidebar-logo">Admin<span>Panel</span></a>
            <button id="sidebarToggle" class="toggle-btn">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <aside class="sidebar" id="sidebar">
            <a href="#" class="sidebar-logo">Admin<span>Panel</span></a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link active">
                        <i class="fas fa-envelope"></i>
                        <span>Messages</span>
                    </a>
                </li>
            </ul>
            <div class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <h1>Contact Messages</h1>
                    <p class="subtitle">Manage your inquiries</p>
                </div>
                <div class="user-info">
                    <div class="avatar"><i class="fas fa-user-shield"></i></div>
                    <span id="adminNameDisplay">Admin</span>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Messages</h3>
                    <div class="value" id="totalMsgCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Recent (24h)</h3>
                    <div class="value" id="recentMsgCount">0</div>
                </div>
            </div>

            <div class="content-card">
                <div class="table-container">
                    <table id="messagesTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Subject</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody id="messagesBody">
                            <!-- Messages will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="./admin-app.js"></script>
</body>
</html>
